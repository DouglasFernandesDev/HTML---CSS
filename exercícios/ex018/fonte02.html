<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <Style>
        @font-face {
            font-family: 'Love';
            src: url(love\ story\ ttf.ttf);
            font-weight: normal;
            font-style: normal;

            /* 
                Tipos de format ()
                - opentype(otf)
                - truetype(ttf)
                -embedded-opentype
                - truetype-att(Apple Advanced Typography)
                -svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Love', Times, serif;
            font-size: 3em;
        }
    </Style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatum magnam odit facilis suscipit temporibus nostrum quo ipsa, aliquid consectetur perspiciatis libero asperiores mollitia eum sint voluptates unde, dolorem dolores? Ad!</p>
</body>
</html>
